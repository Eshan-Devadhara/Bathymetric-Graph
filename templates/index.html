<!DOCTYPE html>
<html>
<head>
    <title>Bathymetric GIS Viewer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- 🔷 TOOLBAR -->
<div class="toolbar">
    
    <form method="POST" enctype="multipart/form-data" style="display:inline;">
        <input type="file" name="file" required>
        <button type="submit">📂 Load Layer</button>
    </form>

    <button onclick="exportPNG()">Export 2D</button>

    <select id="format">
        <option value="obj">OBJ</option>
        <option value="stl">STL</option>
    </select>

    <button onclick="export3D()">Export 3D</button>

    <span class="title">Bathymetric GIS Viewer</span>
</div>

<!-- 🔷 MAIN LAYOUT -->
<div class="container">

    <!-- 🔷 SIDEBAR -->
    <div class="sidebar">
        <h3>Layers</h3>
        <ul>
            <li>Uploaded Layer</li>
        </ul>
    </div>

    <!-- 🔷 MAP AREA -->
    <div class="map-container">

        {% if plot %}
            {{ plot | safe }}
        {% else %}
            <div class="placeholder">
                Upload a dataset to visualize
            </div>
        {% endif %}

    </div>

</div>

<!-- 🔷 STATUS BAR -->
<div class="statusbar">
    Ready | CRS: Auto | Mode: Visualization
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
