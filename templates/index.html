<!DOCTYPE html>
<html>
<head>
    <title>Bathymetric GIS Viewer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- 🔷 TOP TOOLBAR -->
<div class="toolbar">

    <div class="toolbar-left">
        <input type="file" id="fileInput" onchange="uploadFile()">

        <button onclick="uploadFile()">📂 Load</button>

        <button onclick="exportPNG()">Export 2D</button>

        <div class="dropdown">
            <select id="format">
                <option value="obj">OBJ</option>
                <option value="stl">STL</option>
            </select>
            <button onclick="export3D()">Export 3D</button>
        </div>
    </div>

    <div class="toolbar-center">
        Bathymetric GIS Viewer
    </div>

</div>

<!-- 🔷 MAIN LAYOUT -->
<div class="container">

    <!-- 🔷 SIDEBAR -->
    <div class="sidebar">
        <h3>Layers</h3>
        <ul id="layerList">
            <li>No layers loaded</li>
        </ul>
    </div>

    <!-- 🔷 MAP -->
    <div class="map-container">
        {% if plot %}
            {{ plot | safe }}
        {% else %}
            <div class="placeholder">Upload a dataset to visualize</div>
        {% endif %}
    </div>

</div>

<!-- 🔷 STATUS BAR -->
<div class="statusbar">
    Ready | CRS: Auto | Mode: Visualization
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
