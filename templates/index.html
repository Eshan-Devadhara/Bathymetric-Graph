<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bathymetric GIS Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2.0">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                    <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
                    <line x1="9" y1="3" x2="9" y2="18"></line>
                    <line x1="15" y1="6" x2="15" y2="21"></line>
                </svg>
                BathyViz
            </div>

            <div class="upload-section">
                <input type="file" id="fileInput" accept=".csv,.tif,.tiff,.nc,.asc" style="display: none;"
                    onchange="handleFileSelect()">
                <button class="btn btn-primary primary-upload" onclick="document.getElementById('fileInput').click()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Upload Dataset
                </button>
                <div id="file-status" class="status-msg"></div>
            </div>

            <div class="layers-section">
                <h3>Current Layer</h3>
                <div id="layerList" class="empty-state">No dataset loaded</div>
            </div>

            <div class="export-section" id="export-controls" style="display: none;">
                <h3>Export Data</h3>
                <button class="btn btn-secondary" onclick="exportPNG()">Export as 2D PNG</button>
                <div class="export-group">
                    <select id="format" class="dropdown">
                        <option value="obj">OBJ Format</option>
                        <option value="stl">STL Format</option>
                    </select>
                    <button class="btn btn-secondary" onclick="export3D()">Export 3D</button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="map-wrapper" id="map-container">
                <div class="placeholder">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
                        stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5; margin-bottom: 1rem;">
                        <path d="M2 12l5.25 5 2.625-3 6.125 7 6-12"></path>
                    </svg>
                    <h2>Ready for Visualization</h2>
                    <p>Upload a bathymetric dataset (.csv, .tif, .nc) to begin</p>
                </div>
            </div>

            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="loading-overlay" style="display: none;">
                <div class="spinner"></div>
                <div class="loading-text">Processing map data...</div>
            </div>
        </main>
    </div>

    <!-- Error Toast -->
    <div id="errorToast" class="error-toast"></div>

    <script src="{{ url_for('static', filename='app.js') }}?v=2.0"></script>
</body>

</html>
